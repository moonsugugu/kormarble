<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>한국사마블</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Jua', sans-serif;
      }
      .background-container {
        position: relative;
        isolation: isolate;
        background-size: cover;
        background-position: center;
        transition: background-image 0.5s ease-in-out;
      }
      .background-container::after {
        content: '';
        position: absolute;
        inset: 0;
        background-color: rgba(251, 251, 243, 0.85); /* bg-amber-50 with opacity */
        z-index: -1;
        backdrop-filter: blur(4px);
      }
      @keyframes toll-payment-effect {
        0%, 100% { 
          opacity: 0; 
          transform: translateY(20px) scale(0.95);
        }
        10%, 90% { 
          opacity: 1; 
          transform: translateY(0) scale(1);
        }
      }
      .animate-toll-payment {
        animation: toll-payment-effect 3s ease-in-out forwards;
      }
      @keyframes gold-effect {
        0% { transform: translate(-50%, 20px) scale(0.8); opacity: 0; }
        20%, 80% { transform: translate(-50%, 0) scale(1); opacity: 1; }
        100% { transform: translate(-50%, -20px) scale(1.2); opacity: 0; }
      }
      .animate-gold-effect {
        animation: gold-effect 2.5s ease-in-out forwards;
      }
      @keyframes bounce-arrow {
        0%, 100% { transform: translateY(-5px) scale(1); }
        50% { transform: translateY(-15px) scale(1.1); }
      }
      .animate-bounce-arrow {
        animation: bounce-arrow 1s ease-in-out infinite;
      }
    </style>
